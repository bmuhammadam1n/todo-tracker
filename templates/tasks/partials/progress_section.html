<!-- templates/tasks/partials/progress_section.html -->
<div class="bg-gradient-to-r from-indigo-600 to-purple-600 rounded-xl p-6 mb-6 text-white shadow-lg">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
            <h1 class="text-2xl font-bold">Today's Progress</h1>
            <p class="text-indigo-100 text-sm mt-1">
                {{ daily_progress.date|date:"l, F j, Y" }}
            </p>
        </div>
        
        <div class="text-right">
            <div class="text-4xl font-bold">{{ daily_progress.progress_percentage|floatformat:0 }}%</div>
            <p class="text-indigo-100 text-sm">
                {{ daily_progress.completed_tasks }} / {{ daily_progress.total_tasks }} tasks
            </p>
        </div>
    </div>
    
    <!-- Progress Bar -->
    <div class="mt-4">
        <div class="w-full bg-white/20 rounded-full h-3">
            <div class="bg-white h-3 rounded-full transition-all duration-500 ease-out"
                 style="width: {{ daily_progress.progress_percentage }}%"></div>
        </div>
    </div>
</div>
