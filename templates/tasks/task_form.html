<!-- templates/tasks/task_form.html -->
{% extends 'base.html' %}

{% block title %}{{ action }} Task{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white p-6 rounded-lg shadow">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">{{ action }} Task</h1>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="space-y-4">
                <!-- Title -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Title *</label>
                    {{ form.title }}
                    {% if form.title.errors %}
                        <p class="text-red-500 text-xs mt-1">{{ form.title.errors }}</p>
                    {% endif %}
                </div>
                
                <!-- Description -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                    {{ form.description }}
                </div>
                
                <!-- Priority & Due Date Row -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Priority</label>
                        {{ form.priority }}
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Due Date</label>
                        {{ form.due_date }}
                    </div>
                </div>
            </div>
            
            <!-- Buttons -->
            <div class="flex gap-3 mt-6">
                <button type="submit" 
                        class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-medium transition">
                    {{ action }} Task
                </button>
                <a href="{% url 'task_list' %}" 
                   class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-6 py-2 rounded-lg font-medium transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
