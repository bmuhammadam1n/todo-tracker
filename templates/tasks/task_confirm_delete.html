<!-- templates/tasks/task_confirm_delete.html -->
{% extends 'base.html' %}

{% block title %}Delete Task{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white p-6 rounded-lg shadow">
        <h1 class="text-xl font-bold text-gray-800 mb-4">Delete Task?</h1>
        
        <p class="text-gray-600 mb-6">
            Are you sure you want to delete "<strong>{{ task.title }}</strong>"? This action cannot be undone.
        </p>
        
        <form method="post">
            {% csrf_token %}
            <div class="flex gap-3">
                <button type="submit" 
                        class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-lg font-medium transition">
                    Yes, Delete
                </button>
                <a href="{% url 'task_list' %}" 
                   class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-6 py-2 rounded-lg font-medium transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
