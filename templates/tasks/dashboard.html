<!-- templates/tasks/dashboard.html -->
{% extends 'base.html' %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="bg-white p-6 rounded-lg shadow-md">
    <h1 class="text-3xl font-bold text-gray-800 mb-4">Welcome, {{ user.username }}! 👋</h1>
    
    <p class="text-gray-600 mb-6">
        This is your dashboard. In Phase 3, we will add your task list here.
    </p>
    
    <div class="p-4 bg-indigo-50 rounded-lg border border-indigo-100">
        <h3 class="font-bold text-indigo-800 mb-2">✅ Status</h3>
        <p class="text-indigo-600">You are logged in successfully.</p>
    </div>
    
    <div class="mt-6">
        <a href="{% url 'logout' %}" class="inline-block text-sm text-red-600 hover:text-red-800 font-medium">
            Logout →
        </a>
    </div>
</div>
{% endblock %}
